<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>void / chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111111; --border: #1e1e1e;
    --border-light: #2a2a2a; --text: #e8e8e8; --muted: #555555;
    --accent: #ffffff; --dim: #333333; --red: #ff4444;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; line-height: 1.6; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 999; opacity: 0.5; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--surface); border: 1px solid var(--border-light); padding: 36px 32px; width: 320px; max-width: 90vw; }
  .modal-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; color: var(--accent); margin-bottom: 6px; }
  .modal-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 24px; }
  .modal-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border-light); color: var(--text); font-family: 'DM Mono', monospace; font-size: 15px; padding: 8px 0; outline: none; letter-spacing: 0.04em; margin-bottom: 24px; transition: border-color 0.2s; }
  .modal-input:focus { border-color: var(--muted); }
  .modal-input::placeholder { color: var(--dim); }
  .modal-btn { width: 100%; background: var(--accent); border: none; color: #000; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.12em; padding: 12px; cursor: pointer; transition: opacity 0.15s; }
  .modal-btn:hover { opacity: 0.85; }

  .layout { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; max-width: 780px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  header { display: flex; align-items: baseline; justify-content: space-between; padding: 22px 28px 18px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .logo { font-family: 'Playfair Display', serif; font-style: italic; font-size: 20px; color: var(--accent); letter-spacing: -0.02em; }
  .logo span { font-style: normal; color: var(--muted); font-size: 11px; font-family: 'DM Mono', monospace; margin-left: 10px; letter-spacing: 0.08em; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .status { display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: 11px; letter-spacing: 0.05em; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #888; animation: pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .admin-badge { font-size: 10px; color: #555; letter-spacing: 0.1em; border: 1px solid #222; padding: 2px 7px; cursor: pointer; transition: all 0.15s; user-select: none; }
  .admin-badge.active { color: var(--accent); border-color: var(--accent); }
  .admin-badge:hover { border-color: var(--muted); color: var(--muted); }

  .messages { overflow-y: auto; display: flex; flex-direction: column; background: var(--bg); scrollbar-width: thin; scrollbar-color: var(--dim) transparent; }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .day-divider { display: flex; align-items: center; gap: 12px; padding: 20px 28px 8px; color: var(--muted); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }
  .day-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .message { display: grid; grid-template-columns: 80px 1fr auto; gap: 0 16px; padding: 10px 28px; transition: background 0.15s; animation: fadeSlide 0.25s ease; align-items: start; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .message:hover { background: rgba(255,255,255,0.02); }
  .message.own { background: rgba(255,255,255,0.025); }
  .message-meta { text-align: right; padding-top: 1px; }
  .message-name { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .message-time { font-size: 10px; color: #3a3a3a; }
  .message-body { color: var(--text); font-size: 13px; line-height: 1.65; word-break: break-word; padding-top: 1px; }
  .message.own .message-name { color: #aaa; }

  .delete-btn { background: transparent; border: none; color: #333; cursor: pointer; font-size: 13px; padding: 2px 4px; transition: color 0.15s; opacity: 0; align-self: start; margin-top: 3px; }
  .message:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--red); }

  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--dim); gap: 8px; padding: 60px 20px; }
  .empty-state .big { font-family: 'Playfair Display', serif; font-style: italic; font-size: 32px; color: #222; }
  .empty-state .small { font-size: 11px; letter-spacing: 0.1em; color: #2a2a2a; }

  footer { border-top: 1px solid var(--border); background: var(--bg); padding: 10px 28px 16px; }
  .name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .name-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; white-space: nowrap; }
  .current-name { font-size: 12px; color: #aaa; letter-spacing: 0.03em; cursor: pointer; border-bottom: 1px solid transparent; transition: border-color 0.15s; }
  .current-name:hover { border-color: var(--muted); }
  .input-row { display: flex; align-items: flex-end; gap: 12px; }
  .msg-input { flex: 1; background: var(--surface); border: 1px solid var(--border-light); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 14px; outline: none; resize: none; min-height: 42px; max-height: 120px; line-height: 1.5; transition: border-color 0.2s; }
  .msg-input:focus { border-color: var(--muted); }
  .msg-input::placeholder { color: var(--dim); }
  .send-btn { background: transparent; border: 1px solid var(--border-light); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; padding: 10px 18px; cursor: pointer; transition: all 0.18s; white-space: nowrap; height: 42px; display: flex; align-items: center; }
  .send-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,255,255,0.04); }
  .send-btn:active { transform: scale(0.97); }
  .hint { margin-top: 8px; color: #2e2e2e; font-size: 10px; letter-spacing: 0.06em; }
  .branding { margin-top: 8px; text-align: center; font-size: 11px; color: #3a3a3a; letter-spacing: 0.08em; padding-bottom: 2px; }

  .admin-popup { position: fixed; top: 62px; right: max(16px, calc((100vw - 780px) / 2 + 16px)); background: var(--surface); border: 1px solid var(--border-light); padding: 16px; z-index: 50; width: 220px; display: none; }
  .admin-popup.visible { display: block; }
  .admin-popup input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border-light); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 6px 0; outline: none; margin-bottom: 12px; letter-spacing: 0.05em; }
  .admin-popup input::placeholder { color: var(--dim); }
  .admin-popup button { width: 100%; background: transparent; border: 1px solid var(--border-light); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; padding: 8px; cursor: pointer; transition: all 0.15s; }
  .admin-popup button:hover { border-color: var(--accent); color: var(--accent); }
  .admin-err { font-size: 10px; color: var(--red); margin-top: 8px; display: none; }
</style>
</head>
<body>

<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <div class="modal-title">void / chat</div>
    <div class="modal-sub">как тебя зовут?</div>
    <input class="modal-input" id="modalNameInput" type="text" placeholder="введи имя..." maxlength="20" autocomplete="off" spellcheck="false">
    <button class="modal-btn" id="modalBtn">ВОЙТИ →</button>
  </div>
</div>

<div class="admin-popup" id="adminPopup">
  <input type="password" id="adminPassInput" placeholder="пароль...">
  <button id="adminLoginBtn">ВОЙТИ КАК АДМИН</button>
  <div class="admin-err" id="adminErr">неверный пароль</div>
</div>

<div class="layout">
  <header>
    <div class="logo">void <span>/ общий чат</span></div>
    <div class="header-right">
      <div class="admin-badge" id="adminBadge">ADMIN</div>
      <div class="status">
        <div class="dot"></div>
        <span id="onlineCount">—</span>
      </div>
    </div>
  </header>
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="big">тишина.</div>
      <div class="small">будь первым. напиши что-нибудь.</div>
    </div>
  </div>
  <footer>
    <div class="name-row">
      <span class="name-label">ИМЯ /</span>
      <span class="current-name" id="currentNameDisplay">—</span>
    </div>
    <div class="input-row">
      <textarea class="msg-input" id="msgInput" placeholder="напиши что-нибудь..." rows="1" maxlength="500" spellcheck="false"></textarea>
      <button class="send-btn" id="sendBtn">SEND ↵</button>
    </div>
    <div class="hint">enter — отправить &nbsp;·&nbsp; shift+enter — новая строка</div>
    <div class="branding">🌲 сделано MrBetka 🌲</div>
  </footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCeLlyIG3xKIN0iXYIdN-8GfTTkIZ3YqSU",
    authDomain: "chatvoid-78cf8.firebaseapp.com",
    databaseURL: "https://chatvoid-78cf8-default-rtdb.firebaseio.com",
    projectId: "chatvoid-78cf8",
    storageBucket: "chatvoid-78cf8.firebasestorage.app",
    messagingSenderId: "464970410415",
    appId: "1:464970410415:web:6c614671f8d5b5c0fa8429"
  };

  const ADMIN_PASSWORD = "MrBetka228";

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, 'messages');
  const presenceRef = ref(db, 'presence');

  let userName = localStorage.getItem('void-chat-name') || '';
  let isAdmin = false;
  let deviceId = localStorage.getItem('void-device-id') || Math.random().toString(36).slice(2);
  localStorage.setItem('void-device-id', deviceId);

  const nameModal = document.getElementById('nameModal');
  const modalNameInput = document.getElementById('modalNameInput');
  const modalBtn = document.getElementById('modalBtn');
  const messagesEl = document.getElementById('messages');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const onlineCount = document.getElementById('onlineCount');
  const currentNameDisplay = document.getElementById('currentNameDisplay');
  const adminBadge = document.getElementById('adminBadge');
  const adminPopup = document.getElementById('adminPopup');
  const adminPassInput = document.getElementById('adminPassInput');
  const adminLoginBtn = document.getElementById('adminLoginBtn');
  const adminErr = document.getElementById('adminErr');

  // ── Modal ──
  function enterChat() {
    const name = modalNameInput.value.trim();
    if (!name) { modalNameInput.placeholder = 'нужно имя!'; return; }
    userName = name;
    localStorage.setItem('void-chat-name', userName);
    currentNameDisplay.textContent = userName;
    nameModal.style.display = 'none';
    setupPresence();
  }

  if (userName) {
    nameModal.style.display = 'none';
    currentNameDisplay.textContent = userName;
    setupPresence();
  } else {
    setTimeout(() => modalNameInput.focus(), 100);
  }

  modalBtn.addEventListener('click', enterChat);
  modalNameInput.addEventListener('keydown', e => { if (e.key === 'Enter') enterChat(); });
  currentNameDisplay.addEventListener('click', () => { modalNameInput.value = userName; nameModal.style.display = 'flex'; setTimeout(() => modalNameInput.focus(), 100); });

  // ── Presence ──
  function setupPresence() {
    const myRef = ref(db, `presence/${deviceId}`);
    const update = () => set(myRef, { name: userName, ts: Date.now() });
    update();
    onDisconnect(myRef).remove();
    setInterval(update, 20000);
  }

  onValue(presenceRef, snap => {
    const data = snap.val() || {};
    const active = Object.values(data).filter(v => Date.now() - v.ts < 40000).length;
    onlineCount.textContent = active + ' онлайн';
  });

  // ── Messages ──
  let lastDay = null;
  let renderedKeys = new Set();

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
  function fmtTime(ts) { return new Date(ts).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}); }
  function fmtDay(ts) {
    const d = new Date(ts), now = new Date();
    if (d.toDateString()===now.toDateString()) return 'сегодня';
    const y = new Date(now); y.setDate(y.getDate()-1);
    if (d.toDateString()===y.toDateString()) return 'вчера';
    return d.toLocaleDateString('ru',{day:'numeric',month:'long'});
  }

  onValue(messagesRef, snap => {
    const wasAtBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;
    const data = snap.val() || {};
    const keys = Object.keys(data);

    // Remove deleted
    [...renderedKeys].forEach(k => {
      if (!data[k]) {
        document.querySelector(`[data-key="${k}"]`)?.remove();
        renderedKeys.delete(k);
      }
    });

    if (keys.length === 0) {
      if (!document.getElementById('emptyState')) {
        messagesEl.innerHTML = '';
        const e = document.createElement('div');
        e.className = 'empty-state'; e.id = 'emptyState';
        e.innerHTML = '<div class="big">тишина.</div><div class="small">будь первым. напиши что-нибудь.</div>';
        messagesEl.appendChild(e);
      }
      lastDay = null; renderedKeys.clear(); return;
    } else {
      document.getElementById('emptyState')?.remove();
    }

    keys.sort((a,b) => data[a].ts - data[b].ts).forEach(key => {
      if (renderedKeys.has(key)) return;
      renderedKeys.add(key);
      const msg = data[key];
      const day = new Date(msg.ts).toDateString();
      if (day !== lastDay) {
        lastDay = day;
        const div = document.createElement('div');
        div.className = 'day-divider';
        div.textContent = fmtDay(msg.ts);
        messagesEl.appendChild(div);
      }
      const isOwn = msg.device === deviceId;
      const el = document.createElement('div');
      el.className = 'message' + (isOwn ? ' own' : '');
      el.dataset.key = key;
      el.innerHTML = `
        <div class="message-meta">
          <span class="message-name">${esc(msg.name||'аноним')}</span>
          <span class="message-time">${fmtTime(msg.ts)}</span>
        </div>
        <div class="message-body">${esc(msg.text)}</div>
        <button class="delete-btn" style="display:${isAdmin?'block':'none'}" title="удалить">✕</button>
      `;
      el.querySelector('.delete-btn').addEventListener('click', () => remove(ref(db, `messages/${key}`)));
      messagesEl.appendChild(el);
    });

    if (wasAtBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
  });

  // ── Send ──
  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !userName) return;
    msgInput.value = ''; msgInput.style.height = 'auto';
    await push(messagesRef, { name: userName, device: deviceId, text, ts: Date.now() });
    msgInput.focus();
  }

  msgInput.addEventListener('input', () => { msgInput.style.height = 'auto'; msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px'; });
  msgInput.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  sendBtn.addEventListener('click', sendMessage);

  // ── Admin ──
  adminBadge.addEventListener('click', () => {
    if (isAdmin) {
      isAdmin = false;
      adminBadge.classList.remove('active');
      document.querySelectorAll('.delete-btn').forEach(b => b.style.display = 'none');
      return;
    }
    adminPopup.classList.toggle('visible');
    if (adminPopup.classList.contains('visible')) setTimeout(() => adminPassInput.focus(), 50);
  });

  adminLoginBtn.addEventListener('click', () => {
    if (adminPassInput.value === ADMIN_PASSWORD) {
      isAdmin = true;
      adminBadge.classList.add('active');
      adminPopup.classList.remove('visible');
      adminPassInput.value = '';
      adminErr.style.display = 'none';
      document.querySelectorAll('.delete-btn').forEach(b => b.style.display = 'block');
    } else {
      adminErr.style.display = 'block';
      adminPassInput.value = '';
    }
  });

  adminPassInput.addEventListener('keydown', e => { if (e.key==='Enter') adminLoginBtn.click(); });
  document.addEventListener('click', e => {
    if (!adminPopup.contains(e.target) && e.target !== adminBadge) adminPopup.classList.remove('visible');
  });
</script>
</body>
</html>
