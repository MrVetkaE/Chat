<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>void / chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --border-light: #2a2a2a;
    --text: #e8e8e8;
    --muted: #555555;
    --accent: #ffffff;
    --dim: #333333;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    overflow: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  .layout {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    max-width: 780px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* HEADER */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 22px 28px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .logo span {
    font-style: normal;
    color: var(--muted);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    margin-left: 10px;
    letter-spacing: 0.08em;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 7px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #3a3a3a;
    animation: pulse 2.5s ease-in-out infinite;
  }

  .dot.live { background: #888; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* MESSAGES */
  .messages {
    overflow-y: auto;
    padding: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .day-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 28px 8px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .day-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .message {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 0 16px;
    padding: 10px 28px;
    transition: background 0.15s;
    border-bottom: 1px solid transparent;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message:hover {
    background: rgba(255,255,255,0.02);
  }

  .message.own {
    background: rgba(255,255,255,0.025);
  }

  .message-meta {
    text-align: right;
    padding-top: 1px;
  }

  .message-name {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }

  .message-time {
    font-size: 10px;
    color: #3a3a3a;
    letter-spacing: 0.02em;
  }

  .message-body {
    color: var(--text);
    font-size: 13px;
    line-height: 1.65;
    word-break: break-word;
    padding-top: 1px;
  }

  .message.own .message-name { color: #aaa; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    gap: 8px;
    padding: 60px 20px;
  }

  .empty-state .big {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 32px;
    color: #222;
  }

  .empty-state .small {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #2a2a2a;
  }

  /* INPUT AREA */
  footer {
    border-top: 1px solid var(--border);
    background: var(--bg);
    padding: 16px 28px 20px;
  }

  .name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .name-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .name-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border-light);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 2px 0;
    width: 140px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.03em;
  }

  .name-input:focus { border-color: var(--muted); }
  .name-input::placeholder { color: var(--dim); }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
  }

  .msg-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border-light);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    resize: none;
    min-height: 42px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
    letter-spacing: 0.02em;
  }

  .msg-input:focus { border-color: var(--muted); }
  .msg-input::placeholder { color: var(--dim); }

  .send-btn {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    height: 42px;
    display: flex;
    align-items: center;
  }

  .send-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255,255,255,0.04);
  }

  .send-btn:active { transform: scale(0.97); }

  .hint {
    margin-top: 8px;
    color: #2e2e2e;
    font-size: 10px;
    letter-spacing: 0.06em;
  }

  /* scrollbar for firefox */
  .messages { scrollbar-width: thin; scrollbar-color: var(--dim) transparent; }
</style>
</head>
<body>
<div class="layout">
  <header>
    <div class="logo">void <span>/ общий чат</span></div>
    <div class="status">
      <div class="dot live" id="statusDot"></div>
      <span id="onlineCount">—</span>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="big">тишина.</div>
      <div class="small">будь первым. напиши что-нибудь.</div>
    </div>
  </div>

  <footer>
    <div class="name-row">
      <span class="name-label">ИМЯ /</span>
      <input class="name-input" id="nameInput" type="text" placeholder="аноним" maxlength="20" autocomplete="off" spellcheck="false">
    </div>
    <div class="input-row">
      <textarea class="msg-input" id="msgInput" placeholder="напиши что-нибудь..." rows="1" maxlength="500" spellcheck="false"></textarea>
      <button class="send-btn" id="sendBtn">SEND ↵</button>
    </div>
    <div class="hint">enter — отправить &nbsp;·&nbsp; shift+enter — новая строка</div>
  </footer>
</div>

<script>
  // ─── Storage using window.storage ───
  const MESSAGES_KEY = 'void-chat-messages';
  const MAX_MESSAGES = 200;

  let allMessages = [];
  let myName = localStorage.getItem('void-chat-name') || '';

  const messagesEl = document.getElementById('messages');
  const emptyEl = document.getElementById('emptyState');
  const nameInput = document.getElementById('nameInput');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const onlineCount = document.getElementById('onlineCount');

  nameInput.value = myName;
  nameInput.addEventListener('input', () => {
    myName = nameInput.value.trim();
    localStorage.setItem('void-chat-name', myName);
  });

  // ─── Render ───
  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
  }

  function formatDay(ts) {
    const d = new Date(ts);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    if (isToday) return 'сегодня';
    const yest = new Date(now); yest.setDate(yest.getDate() - 1);
    if (d.toDateString() === yest.toDateString()) return 'вчера';
    return d.toLocaleDateString('ru', { day: 'numeric', month: 'long' });
  }

  function renderMessages(msgs, isInitial = false) {
    const wasAtBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;

    if (isInitial) {
      messagesEl.innerHTML = '';
      if (msgs.length === 0) {
        messagesEl.appendChild(emptyEl);
        return;
      }
    } else {
      const existingEmpty = messagesEl.querySelector('.empty-state');
      if (existingEmpty) messagesEl.removeChild(existingEmpty);
    }

    let lastDay = null;

    if (isInitial) {
      msgs.forEach(msg => {
        const day = new Date(msg.ts).toDateString();
        if (day !== lastDay) {
          lastDay = day;
          messagesEl.appendChild(makeDivider(msg.ts));
        }
        messagesEl.appendChild(makeMessage(msg));
      });
    } else {
      // Only append new ones
      const lastRendered = messagesEl.querySelectorAll('.message');
      const startIdx = lastRendered.length;
      const newMsgs = msgs.slice(startIdx);

      if (newMsgs.length === 0) return;

      // figure out last day from existing
      if (lastRendered.length > 0) {
        const lastTs = parseInt(lastRendered[lastRendered.length - 1].dataset.ts);
        lastDay = new Date(lastTs).toDateString();
      }

      newMsgs.forEach(msg => {
        const day = new Date(msg.ts).toDateString();
        if (day !== lastDay) {
          lastDay = day;
          messagesEl.appendChild(makeDivider(msg.ts));
        }
        messagesEl.appendChild(makeMessage(msg));
      });
    }

    if (isInitial || wasAtBottom) {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }

  function makeDivider(ts) {
    const div = document.createElement('div');
    div.className = 'day-divider';
    div.textContent = formatDay(ts);
    return div;
  }

  function makeMessage(msg) {
    const isOwn = msg.name === (myName || 'аноним') && msg.device === getDeviceId();
    const el = document.createElement('div');
    el.className = 'message' + (isOwn ? ' own' : '');
    el.dataset.ts = msg.ts;
    el.innerHTML = `
      <div class="message-meta">
        <span class="message-name">${escHtml(msg.name || 'аноним')}</span>
        <span class="message-time">${formatTime(msg.ts)}</span>
      </div>
      <div class="message-body">${escHtml(msg.text)}</div>
    `;
    return el;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  // ─── Device ID (for "own" detection) ───
  function getDeviceId() {
    let id = localStorage.getItem('void-device-id');
    if (!id) { id = Math.random().toString(36).slice(2); localStorage.setItem('void-device-id', id); }
    return id;
  }

  // ─── Load messages from shared storage ───
  async function loadMessages() {
    try {
      const result = await window.storage.get(MESSAGES_KEY, true);
      allMessages = result ? JSON.parse(result.value) : [];
    } catch {
      allMessages = [];
    }
    renderMessages(allMessages, true);
    updateOnlineCount();
  }

  async function pollMessages() {
    try {
      const result = await window.storage.get(MESSAGES_KEY, true);
      const fresh = result ? JSON.parse(result.value) : [];
      if (fresh.length !== allMessages.length) {
        const wasAtBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;
        allMessages = fresh;
        renderMessages(allMessages, false);
        if (wasAtBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
      }
      updateOnlineCount();
    } catch {}
  }

  // ─── Online presence (rough estimate via heartbeat) ───
  const PRESENCE_KEY = 'void-presence';

  async function heartbeat() {
    const id = getDeviceId();
    const now = Date.now();
    try {
      const res = await window.storage.get(PRESENCE_KEY, true);
      let presence = res ? JSON.parse(res.value) : {};
      // clean old (> 30s)
      Object.keys(presence).forEach(k => { if (now - presence[k] > 30000) delete presence[k]; });
      presence[id] = now;
      await window.storage.set(PRESENCE_KEY, JSON.stringify(presence), true);
      updateOnlineCount(Object.keys(presence).length);
    } catch {}
  }

  function updateOnlineCount(n) {
    if (n !== undefined) {
      onlineCount.textContent = n + ' онлайн';
    }
  }

  // ─── Send message ───
  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;

    const msg = {
      id: Date.now() + Math.random().toString(36).slice(2),
      name: myName || 'аноним',
      device: getDeviceId(),
      text: text,
      ts: Date.now()
    };

    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = true;

    try {
      const res = await window.storage.get(MESSAGES_KEY, true);
      let msgs = res ? JSON.parse(res.value) : [];
      msgs.push(msg);
      if (msgs.length > MAX_MESSAGES) msgs = msgs.slice(-MAX_MESSAGES);
      await window.storage.set(MESSAGES_KEY, JSON.stringify(msgs), true);
      allMessages = msgs;
      renderMessages(allMessages, true);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } catch (e) {
      console.error(e);
    }

    sendBtn.disabled = false;
    msgInput.focus();
  }

  // ─── Textarea auto-resize ───
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });

  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ─── Init ───
  loadMessages();
  heartbeat();
  setInterval(pollMessages, 3000);
  setInterval(heartbeat, 15000);
</script>
</body>
</html>
